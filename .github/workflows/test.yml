name: test

on:
  # data/ だけの自動コミット(15分毎)では走らないよう paths を絞る
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # 直書きだとテストファイル追加時に漏れるため glob で拾う
      - run: node --test scripts/*.test.mjs
