<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#fcfcfb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a19" media="(prefers-color-scheme: dark)">
  <title>リビング環境ダッシュボード</title>
  <meta name="apple-mobile-web-app-title" content="リビング環境">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="viz-root">
    <header class="page-header">
      <div class="title-row">
        <h1 id="page-title">環境ダッシュボード</h1>
        <span class="season-chip" id="season-label"></span>
      </div>
      <p class="meta"><span id="updated-at">読み込み中…</span></p>
    </header>

    <div id="alert-banner" class="alert-banner" hidden></div>

    <div id="empty-state" class="empty-state" hidden>
      まだデータがありません。GitHub Actions の初回実行後に表示されます。
    </div>

    <section class="cards" id="cards" aria-label="現在値"></section>

    <nav class="filter-row" aria-label="表示期間">
      <button type="button" class="range-btn" data-range="24h">24時間</button>
      <button type="button" class="range-btn" data-range="7d">7日</button>
      <button type="button" class="range-btn" data-range="30d">30日</button>
    </nav>

    <section class="chart-card" aria-label="温度と湿度の推移">
      <figure class="panel">
        <figcaption>温度 <span class="unit">℃</span></figcaption>
        <div class="canvas-wrap"><canvas id="chart-temp"></canvas></div>
      </figure>
      <figure class="panel">
        <figcaption>湿度 <span class="unit">%</span></figcaption>
        <div class="canvas-wrap"><canvas id="chart-hum"></canvas></div>
      </figure>
      <div id="tooltip" class="tooltip" hidden></div>
    </section>

    <details class="table-view" open id="daily-summary" hidden>
      <summary>日別サマリー <span class="note">各セルは 最低 / 平均 / 最高</span></summary>
      <div class="table-scroll">
        <table id="daily-table">
          <thead>
            <tr><th>日付</th><th>温度 ℃</th><th>湿度 %</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </details>

    <details class="table-view">
      <summary>データ表(直近の記録)</summary>
      <div class="table-scroll">
        <table id="data-table">
          <thead>
            <tr><th>日時</th><th>温度 ℃</th><th>湿度 %</th><th>照度</th><th>不快指数</th><th>絶対湿度 g/m³</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </details>

    <footer class="page-footer">
      <p>SwitchBot HUB2 · 15分間隔で自動記録</p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
